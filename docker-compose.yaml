###############################################################
# docker-compose.yml — Hotspot Auth Stack para Coolify
# -----------------------------------------------------------
# Como usar no Coolify:
#   1. Crie um novo serviço → "Docker Compose"
#   2. Cole este arquivo ou aponte para o repositório Git
#   3. Configure as variáveis de ambiente na aba "Environment"
#   4. Clique em Deploy
###############################################################

services:

  hotspot-auth:
    build:
      context: .
      dockerfile: Dockerfile

    # Nome do container
    container_name: hotspot-auth

    # Reinicia automaticamente em caso de falha
    restart: unless-stopped

    # Porta exposta (Coolify gerencia o proxy reverso)
    ports:
      - "5000:5000"

    # -------------------------------------------------------
    # VARIÁVEIS DE AMBIENTE
    # Edite os valores diretamente aqui OU configure na
    # aba "Environment Variables" do Coolify (recomendado)
    # -------------------------------------------------------
    environment:
      # ── MikroTik ──────────────────────────────────────────
      - MIKROTIK_HOST=${MIKROTIK_HOST:-192.168.10.1}
      - MIKROTIK_USER=${MIKROTIK_USER:-admin}
      - MIKROTIK_PASSWORD=${MIKROTIK_PASSWORD:-}
      - MIKROTIK_PORT=${MIKROTIK_PORT:-8728}

      # ── Hotspot ───────────────────────────────────────────
      - HOTSPOT_PROFILE=${HOTSPOT_PROFILE:-perfil-padrao}
      - DEFAULT_REDIRECT=${DEFAULT_REDIRECT:-http://www.google.com}

      # ── Logs ──────────────────────────────────────────────
      - LOG_FILE=/data/acessos.txt

      # ── Flask ─────────────────────────────────────────────
      - FLASK_ENV=production

    # -------------------------------------------------------
    # VOLUME PERSISTENTE — logs de acesso
    # O arquivo acessos.txt sobrevive a reinicializações
    # -------------------------------------------------------
    volumes:
      - hotspot_logs:/data

    # -------------------------------------------------------
    # HEALTHCHECK (Coolify usa isso para monitorar)
    # -------------------------------------------------------
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # -------------------------------------------------------
    # LIMITES DE RECURSO (opcional, ajuste conforme seu VPS)
    # -------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

    # -------------------------------------------------------
    # REDE — Coolify gerencia automaticamente
    # -------------------------------------------------------
    networks:
      - coolify

# ── Volumes ─────────────────────────────────────────────────
volumes:
  hotspot_logs:
    driver: local
    name: hotspot_logs

# ── Redes ───────────────────────────────────────────────────
networks:
  coolify:
    external: true
